<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Advocacia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/images/favicon_io/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <nav id="topbar">
            <div id="nav-image">
                <img src="assets/images/logo.svg" alt="logo do escritório">
            </div>
            <div class="menu-toggle" id="menu-toggle">
                <img src="assets/images/burger-menu.svg" alt="burger-menu">
            </div>
            <ul class="menu" id="menu">
                <li><a href="#areas">Onde atuamos</a></li>
                <li><a href="#team-juridico">Nosso time</a></li>
                <li><a href="#forms">Tire suas dúvidas</a></li>
                <li><a href="#CTA">Fale conosco!</a></li>
            </ul>
        </nav>
        <div id="hero">
            <div id="hero-content"></div>
            <div id="hero-image"></div>
        </div>
    </header>

    <section id="areas">
        <h1></h1>
        <section id="areas-button"></section>
    </section>

    <section id="team-juridico">
        <h1></h1>
        <div id="advogados">
            <div class="advogado">
                <div class="apresentacao"></div>
                <div class="photo-adv"></div>
            </div>
            <div class="advogado">
                <div class="apresentacao"></div>
                <div class="photo-adv"></div>
            </div>
        </div>
    </section>

    <section id="forms">
        <h1></h1>
        <div id="forms-text"></div>
        <div id="form-form"></div>
    </section>

    <section id="CTA">
        <h1></h1>
    </section>

    <footer>
        <h5></h5>
        <li id="social-media">
        </li>
        <p></p>
    </footer>


    
</body>
</html>
